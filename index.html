<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme HQ | Digital Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
        input, select, textarea { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; outline: none; }
        input:focus, select:focus { border-color: #10b981 !important; }
        .fab-container { position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 1rem; z-index: 50; }
        .fab { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.3s; shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-12 flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-800 uppercase italic tracking-tighter">Supreme <span class="text-emerald-500">HQ</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Operational Command v2.0</p>
            </div>
            <div id="connection-status" class="px-3 py-1 bg-emerald-500/10 text-emerald-500 text-[10px] font-black rounded-full border border-emerald-500/20">SYSTEMS LIVE</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-t-emerald-500 shadow-xl">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Inventory Health</p>
                <div class="flex justify-between items-end">
                    <span class="text-sm font-bold text-slate-400 italic">Alerts</span>
                    <span id="stock-count" class="text-4xl font-800 text-emerald-400">--</span>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-t-blue-500 shadow-xl">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Production Queue</p>
                <div class="flex justify-between items-end">
                    <span class="text-sm font-bold text-slate-400 italic">Active Jobs</span>
                    <span id="job-count" class="text-4xl font-800 text-blue-400">--</span>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-t-purple-500 shadow-xl flex flex-col justify-center">
                 <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Quick Navigation</p>
                 <div class="flex gap-2">
                    <button onclick="window.location.href='https://chronotechsolutions.github.io/supreme-jms/'" class="bg-slate-800 p-2 rounded-lg text-[10px] font-black uppercase hover:bg-emerald-600 transition">JMS</button>
                    <button onclick="window.location.href='https://chronotechsolutions.github.io/supreme-inventory/'" class="bg-slate-800 p-2 rounded-lg text-[10px] font-black uppercase hover:bg-emerald-600 transition">INV</button>
                 </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="openModal('jobModal')" class="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 hover:bg-emerald-600/10 transition group">
                <span class="text-2xl group-hover:scale-110 transition">🏗️</span>
                <span class="text-[10px] font-black uppercase tracking-widest">New Job</span>
            </button>
            <button onclick="openModal('reqModal')" class="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 hover:bg-blue-600/10 transition group">
                <span class="text-2xl group-hover:scale-110 transition">📦</span>
                <span class="text-[10px] font-black uppercase tracking-widest">Material Req</span>
            </button>
        </div>
    </div>

    <div id="jobModal" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border-emerald-500/30">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-800 uppercase italic tracking-tighter">New <span class="text-emerald-500">Job Jacket</span></h2>
                <button onclick="closeModal('jobModal')" class="text-slate-500 text-3xl">&times;</button>
            </div>
            <form id="jobForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="jClient" placeholder="Client Name" class="p-4 rounded-2xl text-sm" required>
                    <input type="text" id="jContact" placeholder="Contact Person" class="p-4 rounded-2xl text-sm" required>
                </div>
                <input type="text" id="jDesc" placeholder="Job Description (e.g. Mesh Wrap)" class="w-full p-4 rounded-2xl text-sm" required>
                <div class="grid grid-cols-3 gap-4">
                    <input type="number" id="jW" placeholder="Width (in)" class="p-4 rounded-2xl text-sm" required>
                    <input type="number" id="jH" placeholder="Height (in)" class="p-4 rounded-2xl text-sm" required>
                    <input type="number" id="jQty" placeholder="Qty" class="p-4 rounded-2xl text-sm" required>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-slate-800 pt-6">
                    <div class="space-y-3">
                        <p class="text-[9px] font-black uppercase text-blue-400">Print Dept</p>
                        <select id="jMachine" class="w-full p-3 rounded-xl text-xs"><option value="Yotta">Yotta UV</option><option value="Meitu">Meitu Eco</option><option value="Konica">Konica</option></select>
                        <input type="text" id="jMedia" placeholder="Media Type" class="w-full p-3 rounded-xl text-xs">
                    </div>
                    <div class="space-y-3">
                        <p class="text-[9px] font-black uppercase text-amber-400">Finishing & Logistics</p>
                        <input type="text" id="jFinish" placeholder="Grommets/Hemming" class="w-full p-3 rounded-xl text-xs">
                        <input type="text" id="jSite" placeholder="Install Site/Branch" class="w-full p-3 rounded-xl text-xs">
                    </div>
                </div>
                <button type="submit" id="jobBtn" class="w-full py-5 bg-emerald-600 rounded-2xl font-900 uppercase italic transition active:scale-95">Deploy to Floor</button>
            </form>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-lg shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-800 uppercase italic">Material <span class="text-blue-500">Request</span></h2>
                <button onclick="closeModal('reqModal')" class="text-slate-500 text-3xl">&times;</button>
            </div>
            <form id="reqForm" class="space-y-4">
                <select id="reqItem" class="w-full p-4 rounded-2xl text-sm" required><option>Loading Inventory...</option></select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="reqQty" placeholder="Quantity" class="p-4 rounded-2xl text-sm" required>
                    <input type="text" id="reqJobId" placeholder="Job ID (JO-XXX)" class="p-4 rounded-2xl text-sm" required>
                </div>
                <select id="reqLoc" class="w-full p-4 rounded-2xl text-sm" required><option>Loading Locations...</option></select>
                <input type="text" id="reqStaff" placeholder="Your Name" class="w-full p-4 rounded-2xl text-sm" required>
                <button type="submit" id="reqBtn" class="w-full py-5 bg-blue-600 rounded-2xl font-900 uppercase italic transition active:scale-95">Log Requisition</button>
            </form>
        </div>
    </div>

    <div class="fab-container">
        <div class="fab bg-emerald-600 shadow-emerald-900/40" onclick="openModal('jobModal')">🏗️</div>
        <div class="fab bg-blue-600 shadow-blue-900/40" onclick="openModal('reqModal')">📦</div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzzbFUmnQh7Wxc7TiR5r_2eOeYIhZhbp7LAAtBemuQ-9mMUHwzjECy_Ji2gYRIfIH4/exec';

        // DASHBOARD REFRESH
        async function refreshHQ() {
            try {
                const res = await fetch(`${API}?action=GET_STATS`);
                const data = await res.json();
                document.getElementById('stock-count').innerText = data.criticalItems;
                document.getElementById('job-count').innerText = data.activeJobs;
            } catch (e) { console.error("Sync failed"); }
        }

        // MODAL HANDLERS
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'reqModal') loadDropdowns();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // LOAD DROPDOWNS
        async function loadDropdowns() {
            try {
                const [items, locs] = await Promise.all([
                    fetch(`${API}?action=GET_ITEM_LIST`).then(r => r.json()),
                    fetch(`${API}?action=GET_LOCATION_LIST`).then(r => r.json())
                ]);
                document.getElementById('reqItem').innerHTML = items.map(i => `<option value="${i}">${i}</option>`).join('');
                document.getElementById('reqLoc').innerHTML = locs.map(l => `<option value="${l}">${l}</option>`).join('');
            } catch (e) { console.error("Dropdown sync error"); }
        }

        // SUBMIT: NEW JOB
        document.getElementById('jobForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('jobBtn');
            btn.innerText = "DEPLOYING..."; btn.disabled = true;
            
            const dateTag = new Date().toISOString().slice(5,10).replace('-','');
            const jobId = `JO-${dateTag}-${Math.floor(Math.random()*900)+100}`;

            const payload = {
                action: 'ADD_JOB_JACKET',
                id: jobId,
                client: document.getElementById('jClient').value,
                contact: document.getElementById('jContact').value,
                desc: document.getElementById('jDesc').value,
                w: document.getElementById('jW').value,
                h: document.getElementById('jH').value,
                qty: document.getElementById('jQty').value,
                deadline: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
                staff: "Admin",
                specs: {
                    printing: { machine: document.getElementById('jMachine').value, media: document.getElementById('jMedia').value },
                    finishing: { instructions: document.getElementById('jFinish').value },
                    logistics: { site: document.getElementById('jSite').value }
                }
            };

            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert(`Job ${jobId} Sent to Production Floor!`);
            closeModal('jobModal');
            document.getElementById('jobForm').reset();
            refreshHQ();
            btn.innerText = "Deploy to Floor"; btn.disabled = false;
        };

        // SUBMIT: REQUISITION
        document.getElementById('reqForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reqBtn');
            btn.innerText = "LOGGING..."; btn.disabled = true;

            const payload = {
                action: 'CREATE_REQUISITION',
                item: document.getElementById('reqItem').value,
                qty: document.getElementById('reqQty').value,
                jobId: document.getElementById('reqJobId').value,
                loc: document.getElementById('reqLoc').value,
                staff: document.getElementById('reqStaff').value
            };

            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Requisition Recorded.");
            closeModal('reqModal');
            document.getElementById('reqForm').reset();
            refreshHQ();
            btn.innerText = "Log Requisition"; btn.disabled = false;
        };

        refreshHQ();
    </script>
</body>
</html>
