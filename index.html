<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme HQ | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        
        .hub-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .hub-card:hover { border-color: #6366f1; transform: translateY(-8px); background: rgba(49, 46, 129, 0.3); }
        .stat-badge { background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 64px; height: 64px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); cursor: pointer; z-index: 90; transition: 0.3s; border: none; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 2.5rem; border-radius: 2.5rem; max-width: 420px; width: 90%; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto w-full text-center">
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-800 uppercase italic tracking-tighter mb-10">SUPREME <span class="text-indigo-500">HQ</span></h1>
            
            <div class="flex flex-wrap justify-center gap-4">
                <div class="stat-badge min-w-[130px]">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Active Jobs</p>
                    <p id="job-count" class="text-2xl font-800 text-indigo-400">--</p>
                </div>
                <div class="stat-badge min-w-[130px]">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Stock Alerts</p>
                    <p id="stock-alerts" class="text-2xl font-800 text-emerald-400">--</p>
                </div>
                <div class="stat-badge min-w-[130px]">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Ready to Print</p>
                    <p id="queue-count" class="text-2xl font-800 text-amber-400">--</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
            <a href="https://YOUR_JMS_GITHUB_URL" class="hub-card p-10 rounded-[3rem] group">
                <div><div class="text-4xl mb-10">📝</div><h2 class="text-3xl font-800 uppercase italic mb-2 text-left">Job Manager</h2><p class="text-sm text-slate-400 text-left">Production tracking & Deadlines Management.</p></div>
                <div class="mt-8 text-[10px] text-left font-black text-indigo-500 uppercase tracking-widest">Enter JMS ➔</div>
            </a>

            <a href="https://YOUR_QUEUE_GITHUB_URL" class="hub-card p-10 rounded-[3rem] group">
                <div><div class="text-4xl mb-10">🖨️</div><h2 class="text-3xl font-800 uppercase italic mb-2 text-left">Print Queue</h2><p class="text-sm text-slate-400 text-left">Production Queue Management.</p></div>
                <div class="mt-8 text-[10px] text-left font-black text-amber-500 uppercase tracking-widest">View Queue ➔</div>
            </a>

            <a href="https://YOUR_INVENTORY_URL" class="hub-card p-10 rounded-[3rem] group text-left">
                <div><div class="flex justify-between mb-10"><span class="text-4xl">📦</span><div id="stock-indicator" class="w-2 h-2 rounded-full bg-emerald-500"></div></div><h2 class="text-3xl font-800 uppercase italic mb-2">Stock & BOM</h2><p class="text-sm text-slate-400">Ink levels, vinyl rolls, & Printing assets.</p></div>
                <div class="mt-8 text-[10px] font-black text-emerald-500 uppercase tracking-widest">Manage Stock ➔</div>
            </a>
        </div>
    </div>

    <button class="fab" onclick="toggleModal()">+</button>

    <div id="quickModal" class="modal">
        <div class="modal-content text-left">
            <h3 class="text-2xl font-800 uppercase italic mb-6">Quick <span class="text-indigo-400">Request</span></h3>
            <form onsubmit="submitQuickReq(event)" class="space-y-4">
                <input type="text" id="qJob" placeholder="Job ID (e.g. JO-2026)" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-white" required>
                <input list="inventory-items" id="qItem" placeholder="Search or Type Item..." class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-white" required>

<datalist id="inventory-items">
  <option value="UV-INK-CYAN">
  <option value="UV-INK-MAGENTA">
  <option value="VINYL-GLOSS-54">
  <option value="MESH-BANNER-80">
  </datalist><input type="number" id="qQty" step="0.01" placeholder="Quantity" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-white outline-none" required>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="toggleModal()" class="w-1/3 py-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase">Cancel</button>
                    <button type="submit" id="submit-btn" class="w-2/3 py-4 bg-indigo-600 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-indigo-500/20">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const INV_API = 'PASTE_YOUR_INVENTORY_GOOGLE_SCRIPT_URL';
        const JMS_API = 'PASTE_YOUR_JMS_GOOGLE_SCRIPT_URL';

        async function fetchLiveStats() {
            try {
                const stockRes = await fetch(INV_API + "?action=GET_STATS");
                const stockData = await stockRes.json();
                document.getElementById('stock-alerts').innerText = stockData.criticalItems + " LOW";
                if(stockData.criticalItems > 0) {
                    document.getElementById('stock-indicator').classList.replace('bg-emerald-500', 'bg-red-500');
                    document.getElementById('stock-indicator').classList.add('animate-ping');
                }
                const jmsRes = await fetch(JMS_API + "?action=GET_COUNT");
                const jmsData = await jmsRes.json();
                document.getElementById('job-count').innerText = jmsData.count;
                const queueRes = await fetch(JMS_API + "?action=GET_QUEUE");
                const queueData = await queueRes.json();
                document.getElementById('queue-count').innerText = queueData.length;
            } catch (e) { console.warn("Sync delayed..."); }
        }

        function toggleModal() {
            const m = document.getElementById('quickModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function submitQuickReq(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SENDING..."; btn.disabled = true;
            const payload = { action: 'CREATE_REQUISITION', staff: 'Damian (Quick-Hub)', jobId: document.getElementById('qJob').value, item: document.getElementById('qItem').value, loc: 'Main Warehouse', qty: document.getElementById('qQty').value };
            await fetch(INV_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Logged to sheet."); toggleModal(); e.target.reset(); btn.innerText = "SUBMIT"; btn.disabled = false;
        }

        fetchLiveStats();
        setInterval(fetchLiveStats, 180000);
    </script>
</body>
</html>
